name: guardrail

on:
  push:
    branches: [main]
  pull_request:

jobs:
  design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Design guardrail (tokens-only, no AI tells)
        run: pnpm lint:design
      - name: Token + demo build
        run: pnpm build:demo
      - name: Contrast (WCAG AA, every expression × mode)
        run: pnpm check:contrast
