name: visual

# Visual regression gates the kit's own PRs: a token or component change that restyles any surface
# fails here until the baselines are intentionally refreshed (pnpm test:visual --update-snapshots).
# Runs on macOS so rendering matches the committed *-darwin.png baselines.
on:
  pull_request:
  workflow_dispatch:

jobs:
  visual:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:tokens
      - run: pnpm exec playwright install chromium
      - run: pnpm test:visual
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
